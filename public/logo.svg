<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="36" height="36">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="nebula-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c4dff" />
      <stop offset="100%" stop-color="#00e5ff" />
    </linearGradient>
    <!-- Glass Overlay Gradient -->
    <linearGradient id="glass-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>
    <!-- Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient Glow Behind Logo -->
  <circle cx="50" cy="50" r="36" fill="url(#nebula-bg)" opacity="0.45" filter="url(#neon-glow)" />

  <!-- Outer Rounded Squircle -->
  <rect x="16" y="16" width="68" height="68" rx="20" fill="url(#nebula-bg)" />
  
  <!-- Diagonal Gloss Overlay -->
  <path d="M16,36 Q36,16 76,16 L84,16 L84,24 Q44,24 16,52 Z" fill="url(#glass-grad)" />

  <!-- Inner Play/TV Symbol -->
  <polygon points="42,32 68,50 42,68" fill="#ffffff" />
  
  <!-- Sleek Antennas/Signal indicators -->
  <path d="M35,10 L45,20" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-opacity="0.9" />
  <path d="M65,10 L55,20" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-opacity="0.9" />
  
  <!-- Antenna tips -->
  <circle cx="35" cy="10" r="3" fill="#ffffff" />
  <circle cx="65" cy="10" r="3" fill="#ffffff" />
</svg>
